name: stormy_kit
description: "Stormy - Flutter 开发框架，提供统一配置、SDK注册、模块管理等能力"
version: 1.0.2
resolution: workspace
homepage: https://github.com/EvStorM/stormy
repository: https://github.com/EvStorM/stormy
environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # 网络请求
  dio: ^5.9.1
  # 国际化
  stormy_i18n: ^0.0.1
  # 本地存储
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # 刷新组件
  easy_refresh: ^3.4.0

  # UI组件
  cupertino_icons: ^1.0.6

  # 屏幕适配
  flutter_screenutil: ^5.9.3

  # 主题管理
  adaptive_theme: ^3.7.2
  # 中文字体
  chinese_font_library: ^1.2.0
  # 加载动画
  fade_shimmer: ^2.4.0
  # 网络图片加载
  cached_network_image: ^3.4.1
  # 弹窗
  flutter_smart_dialog: ^5.1.0
  # 底部弹窗
  modal_bottom_sheet: ^3.0.0
  # webview
  flutter_inappwebview: ^6.1.5
  # 权限管理
  permission_handler: ^12.0.1
  # 状态管理
  riverpod_annotation: ^4.0.2
  riverpod: ^3.2.1
  # 日志
  talker: ^5.1.16
  talker_dio_logger: ^5.1.16
  # url启动
  url_launcher: ^6.3.2
  # 唯一id
  uuid: ^4.5.3
  # 图片选择
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  gal: ^2.3.2
  image: ^4.8.0
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  go_router: ^17.1.0
  connectivity_plus: ^7.1.0
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  device_identifier_plugin: ^1.0.1
  flutter_displaymode: ^0.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
